name: Build Rituals

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build datapack and Spigot plugin
      run: ./gradlew build --no-daemon

    - name: Upload datapack artifact
      uses: actions/upload-artifact@v4
      with:
        name: rituals-datapack
        path: build/datapacks/rituals-datapack-*.zip
        if-no-files-found: error

    - name: Upload Spigot plugin artifact
      uses: actions/upload-artifact@v4
      with:
        name: rituals-plugin
        path: plugin/build/libs/rituals-plugin-*.jar
        if-no-files-found: error

    - name: Build summary
      run: |
        echo "## Build artifacts" >> $GITHUB_STEP_SUMMARY
        ls -lh build/datapacks/*.zip >> $GITHUB_STEP_SUMMARY
        ls -lh plugin/build/libs/*.jar >> $GITHUB_STEP_SUMMARY

  validate-datapack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Validate JSON files
      run: |
        find data -name "*.json" -type f -exec python3 -m json.tool {} \; > /dev/null
        python3 -m json.tool pack.mcmeta > /dev/null
        grep -q '"min_inclusive": 107.1' pack.mcmeta
        echo "Datapack JSON valid (Minecraft 26.2 / format 107.1)"
