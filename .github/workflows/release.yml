name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 2.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build --no-daemon

    - name: Get version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "VERSION=${{ inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release Notes
      id: release_notes
      run: |
        cat > release_notes.md << 'EOF'
        # Rituals v${{ steps.get_version.outputs.VERSION }}

        ## What's New

        <!-- Add release notes here -->

        ## Installation

        ### Datapack (vanilla, Spigot, any datapack host)
        1. Download `rituals-datapack-${{ steps.get_version.outputs.VERSION }}.zip`
        2. Place in your world's `datapacks` folder
        3. Run `/reload` or restart the world

        ### Spigot plugin (optional — permissions, config GUI, Vault, PlaceholderAPI)
        1. Download `rituals-plugin-${{ steps.get_version.outputs.VERSION }}.jar`
        2. Place in your server's `plugins` folder
        3. Restart the server (bundled datapack auto-installs when enabled in config)

        ## Documentation

        - [Full Documentation](https://github.com/strixun/rituals/blob/main/docs/README.md)
        - [Build Guide](https://github.com/strixun/rituals/blob/main/docs/BUILD_GUIDE.md)
        - [Spigot Plugin](https://github.com/strixun/rituals/blob/main/docs/SPIGOT_PLUGIN.md)

        ## Compatibility

        - **Minecraft**: 26.2 (pack format 107.1)
        - **Spigot**: 26.2+ (optional plugin)
        - **Java**: 25+ (server); JDK 25 to compile the plugin

        ## Support

        - [Report Issues](https://github.com/strixun/rituals/issues)
        - [Join Discussions](https://github.com/strixun/rituals/discussions)
        EOF

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}
        name: Rituals v${{ steps.get_version.outputs.VERSION }}
        body_path: release_notes.md
        draft: true
        prerelease: false
        files: |
          build/datapacks/rituals-datapack-*.zip
          plugin/build/libs/rituals-plugin-*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Release Summary
      run: |
        echo "## Release created (draft)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Version**: ${{ steps.get_version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "- Datapack zip" >> $GITHUB_STEP_SUMMARY
        echo "- Spigot plugin JAR" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Review the draft release and publish when ready." >> $GITHUB_STEP_SUMMARY
