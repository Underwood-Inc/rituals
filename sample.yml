header-footer:
  enabled: true
  designs:
    world-test:
      display-condition: "%world%=test"
      header:
        - "Test header in world 'test'"
      footer:
        - "Test footer in world 'test'"
    default:
      header:
        - "<#FFFFFF>&m                                                </#E0B11E>"
        - "&3&lServer name"
        - "&r&7&l>> %animation:Welcome%&3 &l%player%&7&l! &7&l<<"
        - "&r&7Online players: &f%online%"
        - "&6Online staff: &e%staffonline%"
        - ""
      footer:
        - "%animation:time%"
        - "&2Ping: %ping%"
        - "&7&l Used memory: %memory-used% MB / %memory-max% MB"
        - ""
        - "&r&7Visit our webpage &bshort.army/shirecraft"
        - "<#FFFFFF>&m                                                </#E0B11E>"
        - "&6💰 Balance: &a%vault_eco_balance_2dp%"
        - "&7⭐ Rank: &f%luckperms_primary_group%"
        - "&7May your path be peaceful"

tablist-name-formatting:
  enabled: true
  disable-condition: '%world%=disabledworld'
  format: "&a%player% &7⟡ &6💰 %vault_eco_balance_2dp%"

scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
    - "GROUPS:owner,admin,mod,helper,builder,vip,default"
    - "PLACEHOLDER_A_TO_Z:%player%"
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false
  disable-condition: '%world%=disabledworld'

playerlist-objective:
  enabled: true
  value: "%vault_eco_balance_2dp%"
  fancy-value: "&6💰 Balance: &a%vault_eco_balance_2dp%"
  title: "TAB"
  render-type: INTEGER
  disable-condition: '%world%=disabledworld'

belowname-objective:
  enabled: false
  value: "%health%"
  fancy-value: "&c%health%"
  fancy-value-default: "NPC"
  title: "&cHealth"
  disable-condition: '%world%=disabledworld'

prevent-spectator-effect:
  enabled: false

bossbar:
  enabled: false
  toggle-command: /bossbar
  remember-toggle-choice: false
  hidden-by-default: false
  bars:
    ServerInfo:
      style: "PROGRESS"
      color: "%animation:barcolors%"
      progress: "100"
      text: "&fWebsite: &bshort.army/shirecraft"

scoreboard:
  enabled: false
  toggle-command: /sb
  remember-toggle-choice: false
  hidden-by-default: false
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard-1.20.3+:
      title: "<#E0B11E>Shirecraft</#3CB4C7>"
      display-condition: "%player-version-id%>=765;%bedrock%=false"
      lines:
        - "&7%date%"
        - "%animation:MyAnimation1%"
        - "&6Online:"
        - "* &eOnline&7:||%online%"
        - "* &eCurrent World&7:||%worldonline%"
        - "* &eStaff&7:||%staffonline%"
        - ""
        - "&6Personal Info:"
        - "* &b⭐ Rank&7:||%luckperms_primary_group%"
        - "* &bPing&7:||%ping%&8ms"
        - "* &bWorld&7:||%world%"
        - "%animation:MyAnimation1%"
        - "* &6💰 Balance&7:||&a%vault_eco_balance_2dp%"
    scoreboard:
      title: "<#E0B11E>Shirecraft</#3CB4C7>"
      lines:
        - "&7%date%"
        - "%animation:MyAnimation1%"
        - "&6Online:"
        - "* &eOnline&7: &f%online%"
        - "* &eCurrent World&7: &f%worldonline%"
        - "* &eStaff&7: &f%staffonline%"
        - ""
        - "* &b⭐ Rank&7: &f%luckperms_primary_group%"
        - "* &bPing&7: &f%ping%&8ms"
        - "* &bWorld&7: &f%world%"
        - "%animation:MyAnimation1%"

layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:37e93c8e12cd426cb28fce31969e0674
  enable-remaining-players-text: true
  remaining-players-text: '... and %s more'
  empty-slot-ping-value: 1000
  layouts:
    default:
      slot-count: 80
      fixed-slots:
        - '1|&3Website&f:'
        - '2|&bshort.army/shirecraft'
        - '3|&8&m                       '
        - '4|&3Name&f:'
        - '5|&b%player%'
        - '7|&3Rank&f:'
        - '8|Rank: %luckperms_primary_group%'
        - '10|&3World&f:'
        - '11|&b%world%'
        - '13|&3Time&f:'
        - '14|&b%time%'
        - '21|&3Teamspeak&f:'
        - '22|&bts.myserver.net'
        - '23|&8&m                       '
        - '41|&3Store&f:'
        - '42|&bshop.myserver.net'
        - '43|&8&m                       '
      groups:
        staff:
          display-condition: permission:tab.staff
          slots:
            - 24-40
        players:
          slots:
            - 44-80

ping-spoof:
  enabled: false
  value: 0

global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  update-latency: false

placeholders:
  date-format: "dd.MM.yyyy"
  time-format: "[HH:mm:ss / h:mm a]"
  time-offset: 0
  register-tab-expansion: false
  locale: en-US

placeholder-output-replacements:
  "%essentials_vanished%":
    "yes": "&7| Vanished"
    "no": ""

conditions:
  nick:
    conditions:
      - "%player%=%essentials_nickname%"
    true: "%player%"
    false: "~%essentials_nickname%"

placeholder-refresh-intervals:
  default-refresh-interval: 500
  "%server_uptime%": 1000
  "%server_tps_1_colored%": 1000
  "%server_unique_joins%": 5000
  "%player_health%": 200
  "%player_ping%": 1000
  "%vault_prefix%": 1000
  "%rel_factionsuuid_relation_color%": 1000

assign-groups-by-permissions: false

primary-group-finding-list:
  - Owner
  - Admin
  - Mod
  - Helper
  - default

permission-refresh-interval: 1000

debug: false

mysql:
  enabled: false
  host: 127.0.0.1
  port: 3306
  database: tab
  username: user
  password: password
  useSSL: true

proxy-support:
  enabled: false
